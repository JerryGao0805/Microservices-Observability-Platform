global:
  scrape_interval: 15s

scrape_configs:
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8081']

  - job_name: risk-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['risk-service:8082']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8083']
