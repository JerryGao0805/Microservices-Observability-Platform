services:
  postgres-orders:
    image: postgres:16
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata-orders:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-notifications:
    image: postgres:16
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
    ports:
      - "5433:5432"
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    image: order-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-orders
      DB_PORT: 5432
      DB_NAME: orders_db
      DB_USER: orders
      DB_PASSWORD: orders
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RISK_SERVICE_URL: http://risk-service:8082
    depends_on:
      postgres-orders:
        condition: service_healthy
      kafka:
        condition: service_healthy
      risk-service:
        condition: service_started

  risk-service:
    image: risk-service
    ports:
      - "8082:8082"

  notification-service:
    image: notification-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-notifications
      DB_PORT: 5432
      DB_NAME: notifications_db
      DB_USER: notifications
      DB_PASSWORD: notifications
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-notifications:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata-orders:
  pgdata-notifications:
